set-option -g set-titles on
set-option -g set-titles-string "#S · #W"
set -g status off
set -ga terminal-overrides ',xterm*:smcup@:rmcup@'

# Truecolor (24-bit) passthrough — required for nvim termguicolors over SSH
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm-256color:RGB'
set -ag terminal-overrides ',xterm-256color:Tc'

bind-key j  select-pane -U
bind-key k  select-pane -D
bind-key h  select-pane -L
bind-key l  select-pane -R
bind-key m last-window
bind-key N previous-window

set -g mouse off

unbind C-b
set -g prefix C-a
bind C-a send-prefix

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
unbind p
bind p paste-buffer


bind r source-file ~/.tmux.conf \; display ".tmux.conf reloaded!"

# New window with a name prompt (prefix-C). prefix-c still creates an unnamed window.
bind C command-prompt -p "window name:" "new-window -n '%%'"
# Rename the current window (prefix-,) is built-in; this prompts for a session rename.
bind S command-prompt -p "session name:" "rename-session '%%'"

unbind [
bind Escape copy-mode

set-option -g history-limit 50000

set -g @plugin 'tmux-plugins/tpm'

set -g @plugin 'tmux-plugins/tmux-yank'

run '~/.tmux/plugins/tpm/tpm'
