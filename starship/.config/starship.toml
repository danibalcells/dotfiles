add_newline = false

palette = "p10k_dark"

format = """
[](fg:seg_main)\
$username\
$hostname\
$directory\
[](fg:seg_main) \
$character"""

right_format = """
$git_branch\
$git_status\
$python\
$nodejs\
$cmd_duration\
[](fg:seg_dark)\
$time\
[](fg:seg_dark)"""

[palettes.p10k_dark]
seg_main = '#444444'
seg_dark = '#262626'
fg_text = '#d4d4d4'
fg_dim = '#7099b8'

[username]
show_always = false
style_user = "fg:fg_text bg:seg_main"
format = '[ $user]($style)'

[hostname]
ssh_only = true
style = "fg:fg_text bg:seg_main"
format = '[@$hostname]($style)'

[directory]
truncation_length = 1
truncate_to_repo = false
fish_style_pwd_dir_length = 1
style = "fg:white bg:seg_main"
format = '[ $path ]($style)'

[git_branch]
symbol = " "
style = "fg:green bg:seg_main"
format = '[](fg:seg_main)[ $symbol$branch(:$remote_branch) ]($style)'
truncation_length = 11
truncation_symbol = "…"

[git_status]
style = "fg:yellow bg:seg_main"
format = '([$all_status$ahead_behind ](fg:yellow bg:seg_main))[](fg:seg_main) '
modified = '!${count}'
untracked = '?${count}'
staged = '+${count}'
deleted = '✘${count}'
renamed = '»${count}'
ahead = '⇡${count}'
behind = '⇣${count}'
diverged = '⇕'

[python]
format = '([$virtualenv ](fg:yellow bg:seg_main))'
detect_extensions = []
detect_files = []
detect_folders = []

[nodejs]
format = '[$symbol$version ](fg:green bg:seg_main)'

[cmd_duration]
min_time = 2000
format = '[ $duration ](fg:yellow bg:seg_main)'

[time]
disabled = false
format = '[ $time ](fg:fg_text bg:seg_dark)'
time_format = "%H:%M:%S"

[character]
success_symbol = "[❯](green)"
error_symbol = "[❯](red)"
